# Mush CLI Taskfile
# Usage: task [task-name]
# List tasks: task --list
#
# This Taskfile can be used standalone (from this directory) or via the root
# Taskfile with namespace: task mush:[task-name]

version: '3'

vars:
  BINARY: mush
  MODULE: github.com/musher-dev/mush
  LEFTHOOK_VERSION: v1.13.6
  GOVULNCHECK_VERSION: v1.1.4
  GOLANGCI_LINT_VERSION: v2.5.0
  SHFMT_VERSION: v3.12.0
  ACTIONLINT_VERSION: v1.7.8
  OAPI_CODEGEN_VERSION: v2.5.0

tasks:
  # ===========================================================================
  # Setup
  # ===========================================================================

  setup:
    desc: Install dependencies and tools
    cmds:
      - go mod download
      - task: setup:tools

  setup:tools:
    desc: Install required tooling
    cmds:
      - go install github.com/evilmartians/lefthook@{{.LEFTHOOK_VERSION}}
      - go install golang.org/x/vuln/cmd/govulncheck@{{.GOVULNCHECK_VERSION}}
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}
      - go install mvdan.cc/sh/v3/cmd/shfmt@{{.SHFMT_VERSION}}
      - go install github.com/rhysd/actionlint/cmd/actionlint@{{.ACTIONLINT_VERSION}}
      - go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@{{.OAPI_CODEGEN_VERSION}}
      - 'command -v shellcheck >/dev/null 2>&1 || echo "Note: shellcheck is not installed. Install it via your OS package manager."'
      - 'command -v vhs >/dev/null 2>&1 || echo "Note: vhs is optional and only required for demo GIF generation."'

  # ===========================================================================
  # Development
  # ===========================================================================

  build:
    desc: Build the mush binary
    cmds:
      - go build -o {{.BINARY}} ./cmd/mush

  build:all:
    desc: Build for all platforms
    cmds:
      - GOOS=darwin GOARCH=amd64 go build -o {{.BINARY}}-darwin-amd64 ./cmd/mush
      - GOOS=darwin GOARCH=arm64 go build -o {{.BINARY}}-darwin-arm64 ./cmd/mush
      - GOOS=linux GOARCH=amd64 go build -o {{.BINARY}}-linux-amd64 ./cmd/mush
      - GOOS=linux GOARCH=arm64 go build -o {{.BINARY}}-linux-arm64 ./cmd/mush
      - GOOS=windows GOARCH=amd64 go build -o {{.BINARY}}-windows-amd64.exe ./cmd/mush

  run:
    desc: Run mush with arguments
    cmds:
      - go run ./cmd/mush {{.CLI_ARGS}}

  # ===========================================================================
  # Code Generation
  # ===========================================================================

  generate:
    desc: Generate API client from OpenAPI spec
    preconditions:
      - sh: command -v oapi-codegen >/dev/null 2>&1
        msg: "oapi-codegen is required. Run 'task setup:tools' first."
    cmds:
      - scripts/generate-client.sh

  # ===========================================================================
  # Demo / VHS
  # ===========================================================================

  vhs:
    desc: Generate demo GIFs from VHS tape files
    deps: [build]
    cmds:
      - vhs docs/vhs/demo.tape

  vhs:validate:
    desc: Validate VHS tape file syntax
    cmds:
      - vhs validate docs/vhs/*.tape

  # ===========================================================================
  # Code Quality
  # ===========================================================================

  check:
    desc: Run all checks (fmt + mod + lint + vuln + shell + workflows + policy + contracts + docs snippets + test + install)
    cmds:
      - task: check:fmt
      - task: check:mod
      - task: check:lint
      - task: check:vuln
      - task: check:shell
      - task: check:workflow
      - task: check:policy
      - task: check:contracts
      - task: check:docs-snippets
      - task: check:test
      - task: check:install

  check:ci:
    desc: Run CI checks without duplicate test execution (uses coverage test pass)
    cmds:
      - task: check:fmt
      - task: check:mod
      - task: check:lint
      - task: check:vuln
      - task: check:shell
      - task: check:workflow
      - task: check:policy
      - task: check:contracts
      - task: check:docs-snippets
      - task: check:test-cover
      - task: check:compile

  check:compile:
    desc: Verify cross-platform compilation for all release targets
    cmds:
      - GOOS=darwin  GOARCH=amd64 go build ./cmd/mush
      - GOOS=darwin  GOARCH=arm64 go build ./cmd/mush
      - GOOS=linux   GOARCH=amd64 go build ./cmd/mush
      - GOOS=linux   GOARCH=arm64 go build ./cmd/mush
      - GOOS=windows GOARCH=amd64 go build ./cmd/mush

  # Quick aliases for common operations
  test:
    desc: Run tests (alias for check:test)
    cmds:
      - task: check:test

  lint:
    desc: Run linter (alias for check:lint)
    cmds:
      - task: check:lint

  check:shell:
    desc: Lint shell scripts with shellcheck and shfmt
    preconditions:
      - sh: command -v shellcheck >/dev/null 2>&1
        msg: "shellcheck is required. Install it and retry."
      - sh: command -v shfmt >/dev/null 2>&1
        msg: "shfmt is required. Run 'task setup:tools' first."
    cmds:
      - bash -c 'shopt -s nullglob; files=(install.sh .devcontainer/scripts/*.sh scripts/*.sh .lefthook/*/*.sh); [[ ${#files[@]} -gt 0 ]] && shellcheck "${files[@]}"'
      - bash -c 'shopt -s nullglob; files=(install.sh .devcontainer/scripts/*.sh scripts/*.sh .lefthook/*/*.sh); [[ ${#files[@]} -gt 0 ]] && shfmt -d -i 2 -ci "${files[@]}"'

  check:workflow:
    desc: Lint GitHub Actions workflows with actionlint
    preconditions:
      - sh: command -v actionlint >/dev/null 2>&1
        msg: "actionlint is required. Run 'task setup:tools' first."
    cmds:
      - actionlint -color

  check:install:
    desc: Run install script integration tests
    cmds:
      - go test -v -count=1 ./test/install/...

  check:fmt:
    desc: Check Go formatting and imports (gofumpt + goimports)
    preconditions:
      - sh: command -v golangci-lint >/dev/null 2>&1
        msg: "golangci-lint is required. Run 'task setup:tools' first."
    cmds:
      - golangci-lint fmt --diff ./...

  check:fmt:files:
    desc: Check Go formatting and imports for specific files
    preconditions:
      - sh: command -v golangci-lint >/dev/null 2>&1
        msg: "golangci-lint is required. Run 'task setup:tools' first."
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Provide file paths via: task check:fmt:files -- <files...>"
    cmds:
      - golangci-lint fmt --diff {{.CLI_ARGS}}

  check:mod:
    desc: Verify module files are tidy
    cmds:
      - go mod tidy -diff

  check:lint:
    desc: Run golangci-lint v2 (strict)
    preconditions:
      - sh: command -v golangci-lint >/dev/null 2>&1
        msg: "golangci-lint is required. Run 'task setup:tools' first."
    cmds:
      - golangci-lint run ./...

  check:lint:files:
    desc: Run golangci-lint for specific files/packages
    preconditions:
      - sh: command -v golangci-lint >/dev/null 2>&1
        msg: "golangci-lint is required. Run 'task setup:tools' first."
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Provide targets via: task check:lint:files -- <files...>"
    cmds:
      - |
        set -euo pipefail
        out_file="$(mktemp)"
        if golangci-lint run {{.CLI_ARGS}} >"$out_file" 2>&1; then
          cat "$out_file"
          rm -f "$out_file"
          exit 0
        fi

        cat "$out_file"
        if grep -q "no go files to analyze" "$out_file"; then
          echo "golangci-lint target-mode bug encountered; falling back to full lint run"
          rm -f "$out_file"
          golangci-lint run ./...
          exit 0
        fi

        rm -f "$out_file"
        exit 1

  check:vuln:
    desc: Run govulncheck
    preconditions:
      - sh: command -v govulncheck >/dev/null 2>&1
        msg: "govulncheck is required. Run 'task setup:tools' first."
    cmds:
      - govulncheck ./...

  check:policy:
    desc: Run repository policy and architecture guardrails
    cmds:
      - go test ./internal/policy

  check:test:
    desc: Run tests with race detection
    cmds:
      - go test -v -race ./...

  check:testscript:
    desc: Run filesystem-driven CLI scenario tests
    cmds:
      - go test -v ./test/script

  check:contracts:
    desc: Run CLI/API contract tests
    cmds:
      - go test -v ./internal/client -run '^TestContract'

  check:docs-snippets:
    desc: Validate documented snippet commands
    cmds:
      - go test -v ./test/script -run '^TestDocSnippets$'

  check:release:
    desc: Validate the checked-in GoReleaser configuration
    preconditions:
      - sh: command -v goreleaser >/dev/null 2>&1
        msg: "goreleaser is required to run release config checks."
    cmds:
      - goreleaser check

  check:canary:
    desc: Run synthetic canary golden-path checks (requires canary env vars)
    cmds:
      - go test -v ./test/canary -run '^TestGoldenPathCanary|TestCanaryHealthProbeBudget$'

  check:test:packages:
    desc: Run tests with race detection for specific packages
    preconditions:
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Provide package paths via: task check:test:packages -- <packages...>"
    cmds:
      - go test -v -race {{.CLI_ARGS}}

  check:test-cover:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  check:coverage:floor:
    desc: Enforce the minimum total coverage percentage from coverage.out
    preconditions:
      - sh: test -f coverage.out
        msg: "coverage.out is required. Run 'task check:test-cover' first."
      - sh: test -n "${COVERAGE_THRESHOLD:-}"
        msg: "COVERAGE_THRESHOLD is required"
    cmds:
      - |
        total="$(go tool cover -func=coverage.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')"
        awk -v total="$total" -v min="$COVERAGE_THRESHOLD" 'BEGIN { exit !(total + 0 >= min + 0) }' || {
          echo "coverage ${total}% is below required ${COVERAGE_THRESHOLD}%"
          exit 1
        }

  check:shell:files:
    desc: Lint specific shell files with shellcheck and shfmt
    preconditions:
      - sh: command -v shellcheck >/dev/null 2>&1
        msg: "shellcheck is required. Install it and retry."
      - sh: command -v shfmt >/dev/null 2>&1
        msg: "shfmt is required. Run 'task setup:tools' first."
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Provide shell files via: task check:shell:files -- <files...>"
    cmds:
      - shellcheck {{.CLI_ARGS}}
      - shfmt -d -i 2 -ci {{.CLI_ARGS}}

  check:workflow:files:
    desc: Lint specific GitHub Actions workflow files with actionlint
    preconditions:
      - sh: command -v actionlint >/dev/null 2>&1
        msg: "actionlint is required. Run 'task setup:tools' first."
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Provide workflow files via: task check:workflow:files -- <files...>"
    cmds:
      - actionlint -color {{.CLI_ARGS}}

  # ===========================================================================
  # Formatting
  # ===========================================================================

  fmt:
    desc: Format Go code and imports
    preconditions:
      - sh: command -v golangci-lint >/dev/null 2>&1
        msg: "golangci-lint is required. Run 'task setup:tools' first."
    cmds:
      - golangci-lint fmt ./...
      - go mod tidy

  # ===========================================================================
  # Documentation Generation
  # ===========================================================================

  docs:generate:
    desc: Regenerate CLI reference documentation from source
    cmds:
      - UPDATE_GOLDEN=1 go test ./cmd/mush -run TestGenerateCLIDocs -count=1

  docs:snapshots:
    desc: Update help output snapshots
    cmds:
      - UPDATE_GOLDEN=1 go test ./cmd/mush -run TestHelpSnapshots -count=1

  # ===========================================================================
  # Golden File Testing
  # ===========================================================================

  test:update-golden:
    desc: Update golden files
    cmds:
      - UPDATE_GOLDEN=1 go test ./...

  # ===========================================================================
  # Git Hooks
  # ===========================================================================

  hooks:install:
    desc: Install repository git hooks via Lefthook
    preconditions:
      - sh: command -v lefthook >/dev/null 2>&1
        msg: "lefthook is required. Run 'task setup:tools' first."
    cmds:
      - git config --unset core.hooksPath || true
      - lefthook install
      - task: hooks:doctor

  hooks:doctor:config:
    desc: Verify Lefthook config and required hook entrypoints are present
    cmds:
      - test -f lefthook.yml || (echo "lefthook.yml not found" && exit 1)
      - test -f cmd/mush-hook/main.go || (echo "missing cmd/mush-hook/main.go" && exit 1)
      - 'command -v lefthook >/dev/null 2>&1 || (echo "lefthook is required (run: task setup:tools)" && exit 1)'
      - 'command -v task >/dev/null 2>&1 || (echo "task is required" && exit 1)'
      - 'command -v git >/dev/null 2>&1 || (echo "git is required" && exit 1)'

  hooks:doctor:
    desc: Verify Lefthook installation in .git/hooks
    cmds:
      - task: hooks:doctor:config
      - test -z "$(git config --get core.hooksPath || true)" || (echo "core.hooksPath must be unset for Lefthook-managed .git/hooks" && exit 1)
      - test -x .git/hooks/pre-commit || (echo "missing executable .git/hooks/pre-commit" && exit 1)
      - test -x .git/hooks/commit-msg || (echo "missing executable .git/hooks/commit-msg" && exit 1)
      - test -x .git/hooks/pre-push || (echo "missing executable .git/hooks/pre-push" && exit 1)

  hooks:pre-commit:go:
    desc: Run staged Go formatting, lint, and policy checks
    preconditions:
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Provide staged Go files via: task hooks:pre-commit:go -- <files...>"
    cmds:
      - task check:fmt:files -- {{.CLI_ARGS}}
      - |
        bash -lc '
          set -euo pipefail
          declare -A package_set=()

          for file in "$@"; do
            dir="$(dirname "$file")"
            if [[ "$dir" == "." ]]; then
              package_set["./"]=1
            else
              package_set["./$dir/..."]=1
            fi
          done

          packages=()
          for pkg in "${!package_set[@]}"; do
            packages+=("$pkg")
          done

          if [[ ${#packages[@]} -gt 0 ]]; then
            task check:lint:files -- "${packages[@]}"
          fi
        ' _ {{.CLI_ARGS}}
      - task check:policy

  hooks:pre-push:
    desc: Run targeted pre-push checks from git's ref update stream
    cmds:
      - go run ./cmd/mush-hook pre-push {{.CLI_ARGS}}

  # ===========================================================================
  # Utilities
  # ===========================================================================

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY}} {{.BINARY}}-*
      - rm -f coverage.out coverage.html
      - rm -f docs/vhs/gif/*.gif

  version:
    desc: Show version info
    cmds:
      - go run ./cmd/mush version

  help:
    desc: Show mush help
    cmds:
      - go run ./cmd/mush --help

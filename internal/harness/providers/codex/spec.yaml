name: codex
displayName: Codex
description: OpenAI Codex CLI code generation tool
binary: codex

directories:
  project: .codex
  user: ~/.codex

bundleDir:
  mode: add_dir
  flag: "--add-dir"

assets:
  skillDir: .agents/skills
  agentDir: .codex/agents
  toolConfigFile: .codex/config.toml

mcp:
  format: toml
  configPath: .codex/config.toml

status:
  versionArgs: ["--version"]
  installHint: "npm install -g @openai/codex"
  installCommand: ["npm", "install", "-g", "@openai/codex"]
  configDir: "~/.codex"

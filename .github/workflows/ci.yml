name: Mush CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Task Quality Gate
    runs-on: ubuntu-latest
    env:
      COVERAGE_THRESHOLD: "50.0"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install Task
        run: |
          go install github.com/go-task/task/v3/cmd/task@v3.48.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install project tools
        run: |
          task setup:tools

      - name: Verify hook bootstrap
        run: |
          task hooks:install

      - name: Run CI quality checks
        run: task check:ci

      - name: Enforce Coverage Floor
        run: task check:coverage:floor

      - name: Validate GoReleaser Config
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: check

      # Optional: Upload coverage
      - name: Upload Coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        if: github.event_name == 'push'

  macos-tests:
    name: macOS Smoke
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run CLI smoke tests
        run: |
          go test ./cmd/mush -run '^(TestHelpSnapshots|TestValidateAPIURL|TestResolveQueueAndHabitatNoInputSelection)$'
          go test ./test/script -run '^TestCLI$'
          go test ./internal/policy

  windows-build:
    name: Windows Smoke
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build and run CLI smoke tests
        run: |
          go build ./cmd/mush
          go test ./cmd/mush -run '^(TestHelpSnapshots|TestValidateAPIURL|TestUnknownFlagReturnsCLIError)$'
          go test ./internal/policy
